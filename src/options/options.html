<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Coursera Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="options-container">
    <div class="onboarding" id="onboarding" style="display:none">
      <h2>Welcome to Auto-Coursera! &#127891;</h2>
      <p>Let's get you set up in 3 easy steps:</p>
      <ol>
        <li>Get a free API key from <a href="https://openrouter.ai/keys" target="_blank" rel="noopener noreferrer">OpenRouter</a></li>
        <li>Paste it below</li>
        <li>Navigate to any Coursera quiz</li>
      </ol>
      <button type="button" id="dismissOnboarding">Got it!</button>
    </div>

    <header>
      <h1>Auto-Coursera Settings</h1>
    </header>

    <section class="settings-group">
      <h2>API Keys</h2>
      <div class="form-field">
        <label for="openrouterKey">OpenRouter API Key</label>
        <input type="password" id="openrouterKey" placeholder="sk-or-...">
      </div>
      <div class="form-field">
        <label for="nvidiaKey">NVIDIA NIM API Key</label>
        <input type="password" id="nvidiaKey" placeholder="nvapi-...">
      </div>
      <div class="form-field">
        <label for="geminiKey">Google Gemini API Key</label>
        <input type="password" id="geminiKey" placeholder="AIza...">
      </div>
      <div class="form-field">
        <label for="groqKey">Groq API Key</label>
        <input type="password" id="groqKey" placeholder="gsk_...">
      </div>
      <div class="form-field">
        <label for="cerebrasKey">Cerebras API Key</label>
        <input type="password" id="cerebrasKey" placeholder="cbs-...">
      </div>
    </section>

    <section class="settings-group">
      <h2>Model Selection</h2>
      <div class="form-field">
        <label for="openrouterModel">OpenRouter Model</label>
        <select id="openrouterModel">
          <optgroup label="🆓 Free — Vision/Multimodal">
            <option value="openrouter/free">Auto-Select Free OpenRouter Model</option> <!-- Do not remove it is a Valid New option for auto-selection -->
            <option value="google/gemma-3-27b-it:free">Gemma 3 27B Vision (Free)</option>
            <option value="mistralai/mistral-small-3.1-24b-instruct:free">Mistral Small 3.1 24B Vision (Free)</option>
            <option value="nvidia/nemotron-nano-12b-v2-vl:free">Nemotron Nano 12B VL (Free)</option>
            <option value="google/gemma-3-12b-it:free">Gemma 3 12B Vision (Free)</option>
            <option value="google/gemma-3-4b-it:free">Gemma 3 4B Vision (Free)</option>
          </optgroup>
          <optgroup label="🆓 Free — Text (Strongest)">
            <option value="nousresearch/hermes-3-llama-3.1-405b:free">Hermes 3 Llama 405B (Free)</option>
            <option value="openai/gpt-oss-120b:free">GPT-OSS 120B (Free)</option>
            <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (Free)</option>
            <option value="qwen/qwen3-next-80b-a3b-instruct:free">Qwen3 Next 80B MoE (Free)</option>
            <option value="stepfun/step-3.5-flash:free">Step 3.5 Flash 196B (Free)</option>
            <option value="z-ai/glm-4.5-air:free">GLM-4.5 Air (Free)</option>
            <option value="arcee-ai/trinity-large-preview:free">Trinity Large 400B MoE (Free)</option>
          </optgroup>
          <optgroup label="🆓 Free — Lightweight">
            <option value="nvidia/nemotron-nano-9b-v2:free">Nemotron Nano 9B (Free)</option>
            <option value="qwen/qwen3-4b:free">Qwen3 4B (Free)</option>
            <option value="meta-llama/llama-3.2-3b-instruct:free">Llama 3.2 3B (Free)</option>
          </optgroup>
          <optgroup label="💰 Paid (Better Quality)">
            <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (Paid)</option>
            <option value="openai/gpt-4o">GPT-4o (Paid)</option>
            <option value="anthropic/claude-sonnet-4">Claude Sonnet 4 (Paid)</option>
          </optgroup>
        </select>
      </div>
      <div class="form-field">
        <label for="nvidiaModel">NVIDIA NIM Model</label>
        <select id="nvidiaModel">
          <optgroup label="⭐ Requested Models">
            <option value="z-ai/glm5">GLM-5 (Z.ai Flagship)</option>
            <option value="moonshotai/kimi-k2.5">Kimi K2.5 (Multimodal)</option>
          </optgroup>
          <optgroup label="🔭 Vision Models">
            <option value="meta/llama-3.2-90b-vision-instruct">Llama 3.2 90B Vision</option>
            <option value="meta/llama-3.2-11b-vision-instruct">Llama 3.2 11B Vision</option>
            <option value="nvidia/nemotron-nano-12b-v2-vl">Nemotron Nano 12B VL</option>
            <option value="microsoft/phi-4-multimodal-instruct">Phi-4 Multimodal</option>
            <option value="nvidia/llama-3.2-nv-vision-instruct">Llama 3.2 NV Vision</option>
          </optgroup>
          <optgroup label="📝 Text Models">
            <option value="z-ai/glm4.7">GLM-4.7 (Agentic)</option>
            <option value="moonshotai/kimi-k2-instruct">Kimi K2 Instruct</option>
            <option value="moonshotai/kimi-k2-thinking">Kimi K2 Thinking</option>
            <option value="deepseek-ai/deepseek-v3.2">DeepSeek V3.2</option>
            <option value="qwen/qwen3.5-397b-a17b">Qwen 3.5 397B MoE</option>
            <option value="meta/llama-4-maverick-17b-128e-instruct">Llama 4 Maverick</option>
            <option value="stepfun-ai/step-3.5-flash">Step 3.5 Flash</option>
          </optgroup>
        </select>
      </div>
      <div class="form-field">
        <label for="geminiModel">Google Gemini Model</label>
        <select id="geminiModel"></select>
      </div>
      <div class="form-field">
        <label for="groqModel">Groq Model</label>
        <select id="groqModel"></select>
      </div>
      <div class="form-field">
        <label for="cerebrasModel">Cerebras Model</label>
        <select id="cerebrasModel"></select>
      </div>
    </section>

    <section class="settings-group">
      <h2>Provider Priority</h2>
      <div class="radio-group">
        <label>
          <input type="radio" name="primaryProvider" value="openrouter" checked>
          OpenRouter (Primary)
        </label>
        <label>
          <input type="radio" name="primaryProvider" value="nvidia-nim">
          NVIDIA NIM (Primary)
        </label>
        <label>
          <input type="radio" name="primaryProvider" value="gemini">
          Google Gemini (Primary)
        </label>
        <label>
          <input type="radio" name="primaryProvider" value="groq">
          Groq (Primary)
        </label>
        <label>
          <input type="radio" name="primaryProvider" value="cerebras">
          Cerebras (Primary)
        </label>
      </div>
    </section>

    <section class="settings-group">
      <h2>Behavior</h2>
      <div class="form-field">
        <label for="confidenceThreshold">
          Confidence Threshold: <span id="thresholdValue">0.7</span>
        </label>
        <input type="range" id="confidenceThreshold" min="0" max="1" step="0.05" value="0.7">
      </div>
      <div class="form-field">
        <label class="toggle-label">
          <input type="checkbox" id="autoSelect" checked aria-label="Enable or disable auto-select">
          <span>Auto-select answers (uncheck for highlight-only)</span>
        </label>
      </div>
      <div class="form-field">
        <label class="toggle-label">
          <input type="checkbox" id="autoStartOnPageLoad" checked aria-label="Enable or disable auto-start on page load">
          <span>Auto-start solver on page load (uncheck to only solve when triggered from popup)</span>
        </label>
      </div>
    </section>

    <div class="button-row">
      <button type="button" id="saveBtn" class="btn btn-primary">Save Settings</button>
      <button type="button" id="testBtn" class="btn btn-secondary">Test Connection</button>
    </div>

    <div id="statusMessage" class="status-message"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
