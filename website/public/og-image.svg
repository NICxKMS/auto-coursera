<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Glow -->
  <circle cx="600" cy="250" r="200" fill="#3b82f6" opacity="0.06"/>

  <!-- Icon -->
  <g transform="translate(556, 180)">
    <rect width="88" height="88" rx="20" fill="url(#accent)"/>
    <g transform="translate(22, 22)" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 2L2 12l20 10 20-10L22 2z"/>
      <path d="M2 32l20 10 20-10"/>
      <path d="M2 22l20 10 20-10"/>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" fill="white" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="800" letter-spacing="-1">
    Auto-Coursera Assistant
  </text>

  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400">
    AI-powered answer assistant for e-learning platforms
  </text>

  <!-- Domain -->
  <text x="600" y="470" text-anchor="middle" fill="#3b82f6" font-family="JetBrains Mono, monospace" font-size="18" font-weight="500">
    autocr.nicx.me
  </text>

  <!-- Bottom border accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
