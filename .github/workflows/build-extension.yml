# =============================================================================
# build-extension.yml — Build & Test Extension (PR / Manual)
# =============================================================================
# Standalone workflow for building and testing the Chrome extension.
# Runs on PRs touching extension source or manual dispatch.
#
# No secrets required — this is a pure build/test workflow.

name: Build Extension

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'extension/**'
      - 'src/**'
      - 'scripts/**'

permissions:
  contents: read

concurrency:
  group: build-ext-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install dependencies
        run: cd extension && pnpm install --frozen-lockfile

      - name: Typecheck
        run: cd extension && pnpm typecheck

      - name: Lint
        run: cd extension && pnpm lint

      - name: Run tests
        run: cd extension && pnpm test

      - name: Build (production)
        run: cd extension && pnpm build:prod

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist/
          retention-days: 30
