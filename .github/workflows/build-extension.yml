# =============================================================================
# build-extension.yml — Build & Test Extension (PR / Manual)
# =============================================================================
# Standalone workflow for building and testing the Chrome extension.
# Runs on PRs touching extension source or manual dispatch.
#
# No secrets required — this is a pure build/test workflow.

name: Build Extension

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'extension/**'
      - 'scripts/**'

permissions:
  contents: read

concurrency:
  group: build-ext-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: '9'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'extension/pnpm-lock.yaml'

      - name: Install dependencies
        run: cd extension && pnpm install --frozen-lockfile

      - name: Typecheck
        run: cd extension && pnpm typecheck

      - name: Lint
        run: cd extension && pnpm lint

      - name: Run tests
        run: cd extension && pnpm test

      - name: Build (production)
        run: cd extension && pnpm build:prod

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: extension-dist
          path: extension/dist/
          retention-days: 30
