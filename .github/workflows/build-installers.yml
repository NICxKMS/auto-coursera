# =============================================================================
# build-installers.yml — Build Go Installers (PR / Manual)
# =============================================================================
# Standalone workflow for cross-compiling the Go installer binaries.
# Runs on PRs touching installer source or manual dispatch.
#
# No secrets required — this is a pure build workflow.

name: Build Installers

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'installer/**'

permissions:
  contents: read

concurrency:
  group: build-inst-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: 'installer/go.sum'

      - name: Vet
        run: cd installer && go vet ./...

      - name: Build all platforms
        run: cd installer && make build-all

      - name: List build outputs
        run: ls -lh installer/dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-binaries
          path: installer/dist/
          retention-days: 30
