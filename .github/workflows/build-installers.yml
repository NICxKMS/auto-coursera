# =============================================================================
# build-installers.yml — Build Go Installers (PR / Manual)
# =============================================================================
# Standalone workflow for cross-compiling the Go installer binaries.
# Runs on PRs touching installer source or manual dispatch.
#
# No secrets required — this is a pure build workflow.

name: Build Installers

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'installer/**'
      - 'version.json'

permissions:
  contents: read

env:
  GO_VERSION: '1.22'

concurrency:
  group: build-inst-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run version sync (idempotent)
        run: bash scripts/sync-constants.sh

      - name: Verify version consistency
        run: bash scripts/check-version.sh

      - name: Verify sync was committed
        run: |
          if ! git diff --quiet; then
            echo "::error::version.json was updated but sync-constants.sh was not run before committing."
            echo "::error::Please run: bash scripts/sync-constants.sh && git add -A && git commit --amend"
            echo ""
            echo "Files that need syncing:"
            git diff --stat
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: 'installer/go.sum'

      - name: Vet
        run: cd installer && go vet ./...

      - name: Build all platforms
        run: cd installer && make build-all

      - name: List build outputs
        run: ls -lh installer/dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-binaries
          path: installer/dist/
          retention-days: 30
