# =============================================================================
# deploy.yml — Main Orchestration: Build, Sign, Upload, Deploy
# =============================================================================
# Triggers:
#   - push to master → deploy website only
#   - push tag v*   → full release pipeline (extension + installers + website + worker)
#
# Required Secrets:
#   CF_ACCOUNT_ID, CF_API_TOKEN, EXTENSION_PRIVATE_KEY, EXTENSION_ID

name: Deploy

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.22'
  PNPM_VERSION: '9'

# Cancel in-progress runs for the same ref
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # VERSION CHECK — Verify all version references match version.json
  # ===========================================================================
  version-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify version consistency
        run: bash scripts/check-version.sh

  # ===========================================================================
  # BUILD EXTENSION — Sign and upload CRX (tags only)
  # ===========================================================================
  build-extension:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'extension/pnpm-lock.yaml'

      - name: Install extension dependencies
        run: cd extension && pnpm install --frozen-lockfile

      - name: Build extension (production)
        run: cd extension && pnpm build:prod

      - name: Guard against placeholder values
        run: |
          if grep -rq 'EXTENSION_ID_PLACEHOLDER' extension/dist/; then
            echo "::error::Placeholder EXTENSION_ID_PLACEHOLDER found in build output"
            exit 1
          fi

      - name: Write signing key
        run: echo "$SIGNING_KEY" > extension-key.pem
        env:
          SIGNING_KEY: ${{ secrets.EXTENSION_PRIVATE_KEY }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Package CRX
        run: |
          ./scripts/package-crx.sh \
            -v "${{ steps.version.outputs.VERSION }}" \
            -k extension-key.pem \
            -s extension/dist

      - name: Cleanup signing key
        if: always()
        run: rm -f extension-key.pem

      - name: Upload CRX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: crx-package
          path: |
            auto_coursera_${{ steps.version.outputs.VERSION }}.crx
            auto_coursera_${{ steps.version.outputs.VERSION }}.crx.sha256
          retention-days: 90

  # ===========================================================================
  # BUILD INSTALLERS — Cross-compile Go binaries (tags only)
  # ===========================================================================
  build-installers:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: 'installer/go.sum'

      - name: Build all platforms
        run: cd installer && make build-all

      - name: Generate checksums
        run: cd installer/dist && sha256sum * > checksums.sha256

      - name: Upload installer artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installers
          path: installer/dist/
          retention-days: 90

  # ===========================================================================
  # CREATE GITHUB RELEASE — Upload all assets (tags only)
  # ===========================================================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-extension, build-installers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - name: Download CRX artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: crx-package

      - name: Download installer artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            auto_coursera_*.crx
            auto_coursera_*.crx.sha256
            installer-*
            checksums.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # DEPLOY WEBSITE (master branch) — No dependencies
  # ===========================================================================
  deploy-website-main:
    if: github.ref == 'refs/heads/master'
    needs: [version-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'website/pnpm-lock.yaml'

      - name: Install website dependencies
        run: cd website && pnpm install --frozen-lockfile

      - name: Build website
        run: cd website && pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=auto-coursera

  # ===========================================================================
  # DEPLOY WEBSITE (release tag) — After extension + installers
  # ===========================================================================
  deploy-website-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-extension, build-installers]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'website/pnpm-lock.yaml'

      - name: Install website dependencies
        run: cd website && pnpm install --frozen-lockfile

      - name: Build website
        run: cd website && pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=auto-coursera

  # ===========================================================================
  # DEPLOY WORKER — Production Cloudflare Worker (tags only)
  # ===========================================================================
  deploy-worker:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'workers/pnpm-lock.yaml'

      - name: Install worker dependencies
        run: cd workers && pnpm install --frozen-lockfile

      - name: Deploy worker to production
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy --env production
          workingDirectory: workers
