# =============================================================================
# deploy.yml — Main Orchestration: Build, Sign, Upload, Deploy
# =============================================================================
# Triggers:
#   - push to master → deploy website only
#   - push tag v*   → full release pipeline (extension + installers + website)
#
# Required Secrets:
#   CF_ACCOUNT_ID, CF_API_TOKEN, EXTENSION_PRIVATE_KEY, EXTENSION_ID

name: Deploy

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  GO_VERSION: '1.23'
  PNPM_VERSION: '10'

# Cancel in-progress runs for the same ref
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # VERSION CHECK — Verify all version references match version.json
  # ===========================================================================
  version-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run version sync (idempotent)
        run: bash scripts/sync-constants.sh

      - name: Verify version consistency
        run: bash scripts/check-version.sh

      - name: Verify sync was committed
        run: |
          if ! git diff --quiet; then
            echo "::error::version.json was updated but sync-constants.sh was not run before committing."
            echo "::error::Please run: bash scripts/sync-constants.sh && git add -A && git commit --amend"
            echo ""
            echo "Files that need syncing:"
            git diff --stat
            exit 1
          fi

  # ===========================================================================
  # BUILD EXTENSION — Sign and upload CRX (tags only)
  # ===========================================================================
  build-extension:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'extension/pnpm-lock.yaml'

      - name: Install extension dependencies
        run: cd extension && pnpm install --frozen-lockfile

      - name: Typecheck extension
        run: cd extension && pnpm typecheck

      - name: Lint extension
        run: cd extension && pnpm lint

      - name: Run extension tests
        run: cd extension && pnpm test

      - name: Build extension (production)
        run: cd extension && pnpm build:prod

      - name: Create extension zip
        run: |
          cd extension
          zip -r ../auto-coursera.zip dist/

      - name: Guard against placeholder values
        run: |
          if grep -rq 'EXTENSION_ID_PLACEHOLDER' extension/dist/; then
            echo "::error::Placeholder EXTENSION_ID_PLACEHOLDER found in build output"
            exit 1
          fi

      - name: Write signing key
        run: echo "$SIGNING_KEY" > extension-key.pem
        env:
          SIGNING_KEY: ${{ secrets.EXTENSION_PRIVATE_KEY }}

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Package CRX
        run: |
          ./scripts/package-crx.sh \
            -v "${{ steps.version.outputs.VERSION }}" \
            -k extension-key.pem \
            -s extension/dist

      - name: Cleanup signing key
        if: always()
        run: rm -f extension-key.pem

      - name: Upload CRX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: crx-package
          path: |
            auto_coursera_${{ steps.version.outputs.VERSION }}.crx
            auto_coursera_${{ steps.version.outputs.VERSION }}.crx.sha256
            auto-coursera.zip
          retention-days: 90

  # ===========================================================================
  # BUILD INSTALLERS — Cross-compile Go binaries (tags only)
  # ===========================================================================
  build-installers:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: 'installer/go.sum'

      - name: Vet installer
        run: cd installer && go vet ./...

      - name: Build all platforms
        run: cd installer && make build-all

      - name: Generate checksums
        run: cd installer/dist && sha256sum * > checksums.sha256

      - name: Upload installer artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installers
          path: installer/dist/
          retention-days: 90

  # ===========================================================================
  # CREATE GITHUB RELEASE — Upload all assets (tags only)
  # ===========================================================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-extension, build-installers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - name: Download CRX artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: crx-package

      - name: Download installer artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installers

      - name: Create GitHub Release
        uses: softprops/action-gh-release@1853d73993c8ca1b2c9c1a7fede39682d0ab5c2a # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            auto_coursera_*.crx
            auto_coursera_*.crx.sha256
            auto-coursera.zip
            installer-*
            checksums.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # DEPLOY WEBSITE (master branch) — Only after current version is published
  # ===========================================================================
  deploy-website-main:
    if: github.ref == 'refs/heads/master'
    needs: [version-check]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Gate master Pages deploy on published GitHub Release assets
        id: release_gate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION=$(jq -r .version version.json)
          TAG="v${VERSION}"
          RELEASE_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          REQUIRED_ASSETS=(
            "auto_coursera_${VERSION}.crx"
            "auto_coursera_${VERSION}.crx.sha256"
            "auto-coursera.zip"
            "installer-windows-amd64.exe"
            "installer-windows-arm64.exe"
            "installer-macos-arm64"
            "installer-macos-amd64"
            "installer-linux-amd64"
            "installer-linux-arm64"
            "checksums.sha256"
          )

          if ! RELEASE_JSON=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "$RELEASE_URL"); then
            echo "::notice::Skipping Cloudflare Pages deploy for ${TAG}: matching GitHub Release does not exist yet."
            echo "release_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$(jq -r '.draft' <<<"$RELEASE_JSON")" != "false" || "$(jq -r '.prerelease' <<<"$RELEASE_JSON")" != "false" ]]; then
            echo "::notice::Skipping Cloudflare Pages deploy for ${TAG}: release exists but is not published yet."
            echo "release_ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for ASSET in "${REQUIRED_ASSETS[@]}"; do
            if ! jq -e --arg name "$ASSET" '.assets[] | select(.name == $name)' <<<"$RELEASE_JSON" > /dev/null; then
              echo "::notice::Skipping Cloudflare Pages deploy for ${TAG}: required release asset '$ASSET' is missing."
              echo "release_ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "release_ready=true" >> "$GITHUB_OUTPUT"
          echo "::notice::GitHub Release ${TAG} is published with the expected assets; continuing with Pages deploy."

      - name: Setup pnpm
        if: steps.release_gate.outputs.release_ready == 'true'
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        if: steps.release_gate.outputs.release_ready == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'website/pnpm-lock.yaml'

      - name: Install website dependencies
        if: steps.release_gate.outputs.release_ready == 'true'
        run: cd website && pnpm install --frozen-lockfile

      - name: Build website
        if: steps.release_gate.outputs.release_ready == 'true'
        run: cd website && pnpm build

      - name: Deploy to Cloudflare Pages
        if: steps.release_gate.outputs.release_ready == 'true'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=auto-coursera --branch=master

  # ===========================================================================
  # DEPLOY WEBSITE (release tag) — After GitHub Release/assets exist
  # ===========================================================================
  deploy-website-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'website/pnpm-lock.yaml'

      - name: Install website dependencies
        run: cd website && pnpm install --frozen-lockfile

      - name: Build website
        run: cd website && pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy website/dist --project-name=auto-coursera --branch=master
